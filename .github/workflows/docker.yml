# ==============================================================
# CARLA – Docker Build & Push Workflow
# Baut das Image auf GitHub und lädt es in die GitHub Container Registry.
# Pull: docker pull ghcr.io/l8tenever/carla:latest
# ==============================================================
name: Docker CI/CD

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Login at GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push CARLA
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/l8tenever/carla:latest
            ghcr.io/l8tenever/carla:${{ github.sha }}
