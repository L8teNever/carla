# ==============================================================
# CARLA – Docker Compose (Production)
# Holt das fertige Image direkt von Docker Hub (l8tenever/carla).
# Ideal für die Bereitstellung auf entfernten Servern.
# ==============================================================
services:
  carla:
    image: l8tenever/carla:latest
    container_name: carla_monitor
    restart: always
    ports:
      - "10.7.0.1:1070:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./storage:/app/storage
      - ./data:/app/data
    environment:
      - CARLA_MODE=ssh
      - CARLA_SSH_HOST=deine-ip
      - CARLA_SSH_USER=root
      - CARLA_SSH_PASS=dein-passwort
      - CARLA_GITHUB_TOKEN=ghp_dein_token
      - CARLA_CF_API_TOKEN=cfut_dein_token
      - CARLA_CF_ACCOUNT_ID=deine-id
      - TZ=Europe/Berlin
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080"]
      interval: 30s
      timeout: 10s
      retries: 3
