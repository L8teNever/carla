# ==============================================================
# CARLA – Docker Compose
# Startet CARLA im Container. Konfiguration erfolgt beim ersten
# Start ueber den Setup-Wizard im Browser.
# ==============================================================
services:
  carla:
    build: .
    container_name: carla_monitor
    restart: always
    ports:
      - "10.7.0.1:1070:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./storage:/app/storage
      - ./data:/app/data
    environment:
      - TZ=Europe/Berlin
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080"]
      interval: 30s
      timeout: 10s
      retries: 3
