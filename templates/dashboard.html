{% extends "base.html" %}

{% block content %}
<div class="view-title">Dashboard</div>
<div class="view-subtitle">Übersicht aller lokalen Docker-Compose Stacks und Container</div>

<div class="overview-stats">
    <div class="stat-card">
        <div class="stat-content">
            <span class="stat-label">Host OS</span>
            <span class="stat-value" id="os-text" style="font-size: 16px; font-weight:600;">Lade...</span>
        </div>
        <div class="stat-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect><line x1="8" y1="21" x2="16" y2="21"></line><line x1="12" y1="17" x2="12" y2="21"></line></svg>
        </div>
    </div>
    <div class="stat-card">
        <div class="stat-content">
            <span class="stat-label">Laufende Stacks</span>
            <span class="stat-value" id="stacks-count-text">0</span>
        </div>
        <div class="stat-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path></svg>
        </div>
    </div>
    <div class="stat-card">
        <div class="stat-content">
            <span class="stat-label">Gesamt Container</span>
            <span class="stat-value" id="containers-count-text">0</span>
        </div>
        <div class="stat-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="8" rx="2" ry="2"></rect><rect x="2" y="14" width="20" height="8" rx="2" ry="2"></rect><line x1="6" y1="6" x2="6.01" y2="6"></line><line x1="6" y1="18" x2="6.01" y2="18"></line></svg>
        </div>
    </div>
</div>

<div class="section-header">
    <div class="section-title">Docker Compose Projekte</div>
    <button onclick="openDeployModal()" class="btn btn-primary">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="width: 14px; height: 14px;"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
        Stack hinzufügen
    </button>
</div>

<div class="grid-layout grid-2" id="stacks-grid">
    <!-- Dynamic stack cards go here -->
</div>

<!-- Deploy Stack Modal -->
<div id="deploy-modal" class="modal-backdrop">
    <div class="modal">
        <div class="modal-header">
            <h3 class="modal-title">Neuen Stack deployen</h3>
            <button onclick="closeDeployModal()" class="modal-close">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="width: 20px; height: 20px;"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
            </button>
        </div>
        <div style="display: flex; flex-direction: column; gap: 15px;">
            <div class="form-group" style="margin-bottom: 0;">
                <label class="form-label">Stack-Name</label>
                <input type="text" id="deploy-stack-name" class="input mono" placeholder="z.B. wordpress-app">
            </div>
            <div class="form-group" style="margin-bottom: 0;">
                <label class="form-label">docker-compose.yml</label>
                <textarea id="deploy-compose" class="textarea mono" rows="12" placeholder="services:&#10;  web:&#10;    image: nginx:alpine&#10;    ports:&#10;      - '80:80'"></textarea>
            </div>
            <div class="form-group" style="margin-bottom: 0;">
                <label class="form-label">Umgebungsvariablen (.env, optional)</label>
                <textarea id="deploy-env" class="textarea mono" rows="3" placeholder="DATABASE_URL=mysql://..."></textarea>
            </div>
        </div>
        <div class="modal-actions">
            <button onclick="closeDeployModal()" class="btn">Abbrechen</button>
            <button onclick="submitDeployStack()" class="btn btn-primary" id="deploy-submit-btn">Erstellen & Starten</button>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
    // Redirect functions for navigation
    function showTerminal(containerName) {
        window.location.href = `/container/${encodeURIComponent(containerName)}/terminal`;
    }
    
    function showStackDetail(stackName) {
        window.location.href = `/stack/${encodeURIComponent(stackName)}`;
    }
    
    function showStackPerformance(stackName) {
        window.location.href = `/stack/${encodeURIComponent(stackName)}/performance`;
    }

    async function initPage(data) {
        renderDashboard();
    }

    function renderDashboard() {
        if (!fullInfrastructureData || !fullInfrastructureData.stacks) return;
        const grid = document.getElementById('stacks-grid');
        grid.innerHTML = '';

        let totalContainers = 0;
        const stacks = Object.keys(fullInfrastructureData.stacks);
        document.getElementById('stacks-count-text').innerText = stacks.length;

        Object.entries(fullInfrastructureData.stacks).forEach(([stackName, containers]) => {
            totalContainers += containers.length;
            const activeContainers = containers.filter(c => c.state === 'running').length;
            
            const card = document.createElement('div');
            card.className = 'card interactive stack-card';
            
            let containerHtml = '';
            containers.forEach(c => {
                const statusDotColor = c.state === 'running' ? 'var(--success)' : 'var(--danger)';
                containerHtml += `
                    <div class="container-item-row" style="margin-bottom: 6px;">
                        <div style="display:flex; align-items:center; gap: 8px; font-weight: 500;">
                            <span style="width: 7.5px; height: 7.5px; border-radius: 50%; background-color: ${statusDotColor}; box-shadow: 0 0 5px ${statusDotColor};"></span>
                            ${c.name}
                        </div>
                        <span style="font-size: 11px; color: var(--text-muted); font-family: var(--font-mono); margin: 0 10px; text-overflow: ellipsis; overflow: hidden; white-space: nowrap; max-width: 145px;" title="${c.image}">
                            ${c.image.split('@')[0]}
                        </span>
                        <button onclick="event.stopPropagation(); showTerminal('${c.name}')" class="btn-quick" title="Logs & Terminal öffnen" style="margin-left: auto;">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" style="width: 13px; height: 13px;"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect><line x1="8" y1="21" x2="16" y2="21"></line><line x1="12" y1="17" x2="12" y2="21"></line></svg>
                        </button>
                    </div>
                `;
            });

            card.innerHTML = `
                <div class="stack-headline">
                    <div>
                        <h4 class="card-title" style="color:var(--primary); font-size:19px;">${stackName}</h4>
                        <span style="font-size:11.5px; color:var(--text-muted); font-family:var(--font-mono); margin-top:2px; display:block;">/opt/stacks/${stackName}</span>
                    </div>
                    
                    <div class="stack-quick-actions" onclick="event.stopPropagation()">
                        <button onclick="executeQuickStackAction('${stackName}', 'start')" class="btn-quick play" title="Stack starten">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
                        </button>
                        <button onclick="executeQuickStackAction('${stackName}', 'restart')" class="btn-quick restart" title="Neustarten">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.57-8.38l5.67-5.67"></path></svg>
                        </button>
                        <button onclick="executeQuickStackAction('${stackName}', 'stop')" class="btn-quick stop" title="Stoppen">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect></svg>
                        </button>
                    </div>
                </div>
                
                <div class="stack-containers-list">
                    ${containerHtml || '<div style="text-align:center; color:var(--text-muted); font-size:12px; padding: 10px 0;">Keine Container erfasst.</div>'}
                </div>

                <div style="display:flex; justify-content:space-between; align-items:center; margin-top: 15px; border-top: 1px solid var(--border); padding-top:12px;">
                    <span class="badge ${activeContainers === containers.length ? 'success' : 'warning'}" style="font-size:10px;">
                        ${activeContainers}/${containers.length} online
                    </span>
                    <div style="display:flex; gap: 8px;">
                        <button onclick="event.stopPropagation(); showStackPerformance('${stackName}')" class="btn btn-sm" title="Performance anzeigen">Metriken</button>
                        <button onclick="event.stopPropagation(); showStackDetail('${stackName}')" class="btn btn-primary btn-sm">Verwalten</button>
                    </div>
                </div>
            `;
            
            card.onclick = () => showStackDetail(stackName);
            grid.appendChild(card);
        });

        document.getElementById('containers-count-text').innerText = totalContainers;
    }

    async function executeQuickStackAction(stackName, action) {
        showToast(`Führe '${action}' auf Stack '${stackName}' aus...`, "info");
        try {
            const r = await fetch(`/api/stack/${stackName}/${action}`, { method: 'POST' });
            const data = await r.json();
            if (data.success) {
                showToast(`Stack '${stackName}' erfolgreich ${action === 'start' ? 'gestartet' : action === 'stop' ? 'gestoppt' : 'neu gestartet'}.`);
                triggerManualRefresh(renderDashboard);
            } else {
                showToast(data.output || "Fehler bei der Ausführung.", "error");
            }
        } catch(e) {
            showToast(e.message, "error");
        }
    }

    // Modal helpers
    function openDeployModal() {
        document.getElementById('deploy-modal').classList.add('active');
    }
    function closeDeployModal() {
        document.getElementById('deploy-modal').classList.remove('active');
    }
    async function submitDeployStack() {
        const name = document.getElementById('deploy-stack-name').value.trim();
        const compose = document.getElementById('deploy-compose').value.trim();
        const env = document.getElementById('deploy-env').value.trim();
        const submitBtn = document.getElementById('deploy-submit-btn');

        if (!name || !compose) {
            showToast("Name und Compose-Datei sind erforderlich.", "error");
            return;
        }

        submitBtn.disabled = true;
        submitBtn.innerText = "Deploye...";

        try {
            const resp = await fetch('/api/stack/deploy', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ stack_name: name, compose, env })
            });

            if (resp.ok) {
                closeDeployModal();
                showToast(`Projekt '${name}' erfolgreich erstellt!`);
                triggerManualRefresh(renderDashboard);
            } else {
                const errData = await resp.json();
                throw new Error(errData.error || "Deployment fehlgeschlagen.");
            }
        } catch (e) {
            showToast(e.message, "error");
        } finally {
            submitBtn.disabled = false;
            submitBtn.innerText = "Erstellen & Starten";
        }
    }
</script>
{% endblock %}
