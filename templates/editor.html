<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>CARLA Editor</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" data-name="vs/editor/editor.main" href="https://cdn.jsdelivr.net/npm/monaco-editor@0.46.0/min/vs/editor/editor.main.css">
<style>
  :root {
    --bg-0:#0b0d12;--bg-1:#11141b;--bg-2:#161a23;--bg-3:#1d2330;--bg-4:#262d3d;
    --line:#232938;--line-2:#2e3548;
    --text:#e6e8ee;--text-dim:#a4abbd;--text-mute:#6e7689;
    --accent:#1ad6cf;--accent-2:#6ee9e4;
    --blue:#6aa8ff;--green:#5fd1a0;--yellow:#f4cf6e;--danger:#ff6464;
    --radius:8px;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;background:var(--bg-0);color:var(--text);font-family:"Inter",system-ui,sans-serif;font-size:13px;overflow:hidden;-webkit-font-smoothing:antialiased;}
  button,input{font-family:inherit;color:inherit;}
  .app{display:grid;grid-template-rows:42px 1fr 22px;height:100vh;}

  /* Topbar */
  .topbar{display:flex;align-items:center;gap:10px;padding:0 14px;background:var(--bg-1);border-bottom:1px solid var(--line);flex-shrink:0;z-index:10;}
  .topbar-back{width:28px;height:28px;border:1px solid var(--line-2);background:var(--bg-2);border-radius:6px;color:var(--text-dim);cursor:pointer;display:grid;place-items:center;text-decoration:none;flex-shrink:0;transition:all .12s;}
  .topbar-back:hover{background:var(--bg-3);color:var(--text);border-color:var(--accent);}
  .topbar-back svg{width:14px;height:14px;}
  .topbar-logo{width:26px;height:26px;border-radius:6px;background:linear-gradient(135deg,#1ad6cf 0%,#0aa3a3 100%);color:#03252b;font-weight:800;font-size:13px;display:grid;place-items:center;flex-shrink:0;letter-spacing:-.03em;}
  .topbar-sep{color:var(--line-2);font-size:16px;font-weight:300;flex-shrink:0;}
  .topbar-path{font-family:"JetBrains Mono",monospace;font-size:12.5px;color:var(--text-dim);display:flex;align-items:center;gap:5px;flex:1;min-width:0;overflow:hidden;white-space:nowrap;}
  .topbar-path .seg{color:var(--text-mute);}
  .topbar-path .fname{color:var(--text);font-weight:600;}
  .ext-badge{flex-shrink:0;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;padding:2px 7px;border-radius:4px;background:rgba(26,214,207,.14);color:var(--accent);border:1px solid rgba(26,214,207,.28);font-family:"JetBrains Mono",monospace;}
  .topbar-spacer{flex:1;}
  .save-indicator{display:inline-flex;align-items:center;gap:5px;font-size:11.5px;color:var(--green);opacity:0;transition:opacity .2s;flex-shrink:0;font-family:"JetBrains Mono",monospace;}
  .save-indicator.visible{opacity:1;}
  .save-indicator svg{width:12px;height:12px;}
  .save-btn{display:inline-flex;align-items:center;gap:7px;height:30px;padding:0 16px;background:var(--accent);color:#03252b;border:none;border-radius:6px;font-weight:600;font-size:12.5px;cursor:pointer;transition:all .12s;flex-shrink:0;}
  .save-btn:hover{background:var(--accent-2);}
  .save-btn svg{width:13px;height:13px;}
  .save-btn:disabled{opacity:.6;pointer-events:none;}

  /* Main layout */
  .main{display:grid;grid-template-columns:1fr 6px 1fr;min-height:0;overflow:hidden;}
  .resize-handle{background:transparent;position:relative;cursor:col-resize;z-index:5;user-select:none;}
  .resize-handle::before{content:'';position:absolute;top:0;bottom:0;left:50%;width:1px;background:var(--line);transform:translateX(-.5px);transition:background .15s,width .15s;}
  .resize-handle:hover::before,.resize-handle.dragging::before{background:var(--accent);width:2px;}
  body.resizing{cursor:col-resize;user-select:none;}
  body.resizing iframe{pointer-events:none;}

  /* Editor pane */
  .editor-pane{display:flex;flex-direction:column;min-width:0;background:#16191f;}
  .editor-tabs{display:flex;align-items:stretch;background:var(--bg-1);border-bottom:1px solid var(--line);min-height:34px;}
  .editor-tab{display:flex;align-items:center;gap:7px;padding:0 14px;height:34px;border-right:1px solid var(--line);font-size:12.5px;font-family:"JetBrains Mono",monospace;color:var(--text);background:#16191f;position:relative;white-space:nowrap;}
  .editor-tab::before{content:'';position:absolute;left:0;right:0;top:0;height:2px;background:var(--accent);}
  .editor-tab .dirty{width:7px;height:7px;border-radius:50%;background:var(--accent);flex-shrink:0;display:none;}
  .editor-tab.is-dirty .dirty{display:block;}
  #editor-host{flex:1;min-height:0;position:relative;}
  .monaco-editor,.monaco-editor-background,.monaco-editor .margin{background-color:#16191f!important;}

  /* Preview pane */
  .preview-pane{display:flex;flex-direction:column;min-width:0;background:var(--bg-1);}
  .preview-bar{display:flex;align-items:center;gap:8px;padding:0 10px;height:34px;background:var(--bg-1);border-bottom:1px solid var(--line);flex-shrink:0;}
  .preview-btn{width:26px;height:24px;border:1px solid var(--line);background:var(--bg-2);color:var(--text-dim);border-radius:5px;cursor:pointer;display:grid;place-items:center;transition:all .12s;flex-shrink:0;}
  .preview-btn:hover{background:var(--bg-3);color:var(--text);}
  .preview-btn svg{width:13px;height:13px;}
  .urlbar{flex:1;min-width:0;height:24px;background:var(--bg-3);border:1px solid var(--line);border-radius:5px;padding:0 10px;display:flex;align-items:center;gap:7px;font-size:11.5px;font-family:"JetBrains Mono",monospace;color:var(--text-dim);overflow:hidden;}
  .urlbar .dot{width:6px;height:6px;border-radius:50%;background:var(--green);flex-shrink:0;}
  .urlbar .val{color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;}
  .device-switch{display:inline-flex;background:var(--bg-2);border:1px solid var(--line);border-radius:5px;padding:2px;gap:1px;flex-shrink:0;}
  .dev-btn{width:26px;height:20px;border:none;background:transparent;color:var(--text-mute);border-radius:3px;cursor:pointer;display:grid;place-items:center;transition:all .12s;}
  .dev-btn svg{width:13px;height:13px;}
  .dev-btn:hover{color:var(--text);}
  .dev-btn.active{background:var(--accent);color:#03252b;}
  .preview-frame-wrap{flex:1;min-height:0;background-color:#0e1117;background-image:linear-gradient(45deg,#0a0c10 25%,transparent 25%),linear-gradient(-45deg,#0a0c10 25%,transparent 25%),linear-gradient(45deg,transparent 75%,#0a0c10 75%),linear-gradient(-45deg,transparent 75%,#0a0c10 75%);background-size:16px 16px;background-position:0 0,0 8px,8px -8px,8px 0;display:flex;align-items:center;justify-content:center;padding:0;position:relative;transition:padding .25s;}
  .preview-frame-wrap.tablet{padding:18px;}
  .preview-frame-wrap.mobile{padding:18px;}
  .device-frame{background:white;width:100%;height:100%;overflow:hidden;border:none;transition:max-width .25s,max-height .25s,border-radius .25s,box-shadow .25s;}
  .preview-frame-wrap.tablet .device-frame{max-width:820px;aspect-ratio:4/3;max-height:100%;border-radius:14px;box-shadow:0 30px 60px -25px rgba(0,0,0,.7),0 0 0 1px #2a3142;}
  .preview-frame-wrap.mobile .device-frame{max-width:380px;aspect-ratio:9/19;max-height:100%;border-radius:26px;box-shadow:0 30px 60px -25px rgba(0,0,0,.7),0 0 0 1px #2a3142;}
  #preview{width:100%;height:100%;border:none;display:block;background:white;}
  .preview-placeholder{position:absolute;inset:0;display:none;align-items:center;justify-content:center;flex-direction:column;gap:12px;color:var(--text-mute);font-size:13px;pointer-events:none;}
  .preview-placeholder svg{width:40px;height:40px;opacity:.35;}
  .preview-placeholder.visible{display:flex;}

  /* Statusbar */
  .statusbar{background:linear-gradient(180deg,#0f1218 0%,#0a0c10 100%);border-top:1px solid var(--line);display:flex;align-items:center;gap:14px;padding:0 14px;color:var(--text-mute);font-size:11px;font-family:"JetBrains Mono",monospace;}
  .st-dot{width:6px;height:6px;border-radius:50%;background:var(--green);box-shadow:0 0 6px var(--green);flex-shrink:0;}
  .st-spacer{flex:1;}

  /* Tooltip */
  [data-tip]{position:relative;}
  [data-tip]::after{content:attr(data-tip);position:absolute;top:calc(100% + 8px);left:50%;transform:translateX(-50%) translateY(-4px);background:#0a0c10;color:var(--text);font-size:11.5px;font-weight:500;font-family:"Inter",sans-serif;padding:5px 9px;border-radius:5px;border:1px solid var(--line-2);white-space:nowrap;pointer-events:none;opacity:0;transition:opacity .12s ease 0s,transform .15s ease 0s;box-shadow:0 6px 14px -4px rgba(0,0,0,.5);z-index:500;}
  [data-tip]:hover::after{opacity:1;transform:translateX(-50%) translateY(0);transition-delay:.4s;}

  *{scrollbar-width:thin;scrollbar-color:#2a3142 transparent;}
  ::-webkit-scrollbar{width:8px;height:6px;}
  ::-webkit-scrollbar-track{background:transparent;}
  ::-webkit-scrollbar-thumb{background:#2a3142;border-radius:3px;}
  ::-webkit-scrollbar-thumb:hover{background:var(--accent);}
</style>
</head>
<body>
<div class="app">

  <header class="topbar">
    <a class="topbar-back" id="back-btn" href="/filemanager" data-tip="Zurück">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M10 3 5 8l5 5"/></svg>
    </a>
    <div class="topbar-logo">CA</div>
    <span class="topbar-sep">/</span>
    <div class="topbar-path" id="path-display"></div>
    <span class="ext-badge" id="ext-badge"></span>
    <div class="topbar-spacer"></div>
    <span class="save-indicator" id="save-indicator">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 8l4 4 6-6"/></svg>
      Gespeichert
    </span>
    <button class="save-btn" id="save-btn" type="button">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3h8l2 2v8a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V3Z"/><rect x="5.5" y="9" width="5" height="4" rx="0.5"/><path d="M5.5 3h4v3h-4z"/></svg>
      Speichern
      <span style="opacity:.6;font-size:11px;font-weight:500">Strg+S</span>
    </button>
  </header>

  <main class="main" id="main">
    <section class="editor-pane">
      <div class="editor-tabs">
        <div class="editor-tab" id="tab-label">
          <svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" id="tab-icon"></svg>
          <span id="tab-filename"></span>
          <div class="dirty"></div>
        </div>
      </div>
      <div id="editor-host"></div>
    </section>

    <div class="resize-handle" id="rh"></div>

    <section class="preview-pane">
      <div class="preview-bar">
        <button class="preview-btn" id="btn-refresh" data-tip="Vorschau neu laden">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M3 8a5 5 0 1 0 1.5-3.5L3 6"/><path d="M3 3v3h3"/></svg>
        </button>
        <div class="urlbar">
          <div class="dot"></div>
          <span class="val" id="url-val">Vorschau</span>
        </div>
        <div class="device-switch">
          <button class="dev-btn active" data-device="desktop" data-tip="Desktop">
            <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="1.5" y="2.5" width="13" height="8" rx="1"/><path d="M6 13h4M8 11v2"/></svg>
          </button>
          <button class="dev-btn" data-device="tablet" data-tip="Tablet">
            <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="1.5" width="10" height="13" rx="1.3"/><path d="M7.2 12.5h1.6"/></svg>
          </button>
          <button class="dev-btn" data-device="mobile" data-tip="Handy">
            <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="4.5" y="1.5" width="7" height="13" rx="1.4"/><path d="M7.4 12.6h1.2"/></svg>
          </button>
        </div>
        <button class="preview-btn" id="btn-open" data-tip="In neuem Tab öffnen">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M6 3H3v10h10v-3"/><path d="M9 3h4v4"/><path d="M7 9l6-6"/></svg>
        </button>
      </div>
      <div class="preview-frame-wrap" id="preview-wrap">
        <div class="device-frame">
          <iframe id="preview" sandbox="allow-scripts allow-forms allow-modals allow-same-origin" title="Vorschau"></iframe>
        </div>
        <div class="preview-placeholder" id="preview-placeholder">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8Z"/><polyline points="14 2 14 8 20 8"/></svg>
          <span>Keine Vorschau für diesen Dateityp</span>
        </div>
      </div>
    </section>
  </main>

  <footer class="statusbar">
    <div class="st-dot"></div>
    <span id="st-file">—</span>
    <div class="st-spacer"></div>
    <span id="st-pos">Ln 1, Col 1</span>
    <span id="st-lang">Text</span>
    <span>UTF-8</span>
    <span style="color:var(--text-mute)">CARLA Editor</span>
  </footer>
</div>

<script>var require={paths:{'vs':'https://cdn.jsdelivr.net/npm/monaco-editor@0.46.0/min/vs'}};</script>
<script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.46.0/min/vs/loader.js"></script>
<script>
const params = new URLSearchParams(window.location.search);
const FILE_PATH = params.get('path') || '';
const BACK_URL  = params.get('back') || '/filemanager';

// ── Path display ──
function setupPathDisplay() {
  const parts = FILE_PATH.split('/').filter(Boolean);
  const filename = parts.pop() || FILE_PATH;
  const ext = filename.includes('.') ? filename.split('.').pop().toLowerCase() : '';
  const display = document.getElementById('path-display');
  display.innerHTML = parts.map(p => `<span class="seg">${p}</span><span class="seg"> / </span>`).join('')
    + `<span class="fname">${filename}</span>`;
  document.getElementById('ext-badge').textContent = ext || 'txt';
  document.getElementById('tab-filename').textContent = filename;
  document.getElementById('st-file').textContent = filename;
  document.getElementById('url-val').textContent = filename;
  document.title = `${filename} — CARLA Editor`;
  document.getElementById('back-btn').href = BACK_URL;

  // Tab icon by type
  const iconEl = document.getElementById('tab-icon');
  if (['html','htm'].includes(ext)) {
    iconEl.innerHTML = '<path d="M3 2h10l-1 12-4 2-4-2L3 2Z"/><path d="M6 6h4M6.5 10h3"/>';
  } else if (ext === 'css') {
    iconEl.innerHTML = '<rect x="2" y="2" width="12" height="12" rx="2"/><path d="M6 6h4M5 10h6"/>';
  } else if (['js','ts','jsx','tsx'].includes(ext)) {
    iconEl.innerHTML = '<rect x="2" y="2" width="12" height="12" rx="2"/><path d="M7 10c0 1.1.9 2 2 2s2-.9 2-2V6M5 6h2"/>';
  } else {
    iconEl.innerHTML = '<path d="M8 2H4a1 1 0 0 0-1 1v10a1 1 0 0 0 1 1h8a1 1 0 0 0 1-1V6Z"/><path d="M8 2v4h4"/>';
  }

  document.getElementById('st-lang').textContent = ({
    html:'HTML',htm:'HTML',css:'CSS',js:'JavaScript',ts:'TypeScript',
    jsx:'JSX',tsx:'TSX',json:'JSON',md:'Markdown',py:'Python',
    sh:'Shell',yml:'YAML',yaml:'YAML',txt:'Text',nginx:'Nginx',
    conf:'Config',xml:'XML',svg:'SVG'
  })[ext] || ext.toUpperCase() || 'Text';

  return ext;
}

// ── Monaco init ──
let editor, isDirty = false, currentExt = '';

require(['vs/editor/editor.main'], async () => {
  currentExt = setupPathDisplay();

  const langMap = {
    html:'html',htm:'html',css:'css',js:'javascript',ts:'typescript',
    jsx:'javascript',tsx:'typescript',json:'json',md:'markdown',
    py:'python',sh:'shell',yml:'yaml',yaml:'yaml',xml:'xml',svg:'xml',
    nginx:'nginx',conf:'nginx'
  };

  editor = monaco.editor.create(document.getElementById('editor-host'), {
    value: '',
    language: langMap[currentExt] || 'plaintext',
    theme: 'vs-dark',
    fontSize: 14,
    fontFamily: '"JetBrains Mono", monospace',
    fontLigatures: true,
    minimap: { enabled: true },
    scrollBeyondLastLine: false,
    wordWrap: 'off',
    tabSize: 2,
    insertSpaces: true,
    automaticLayout: true,
    lineNumbers: 'on',
    renderLineHighlight: 'all',
    smoothScrolling: true,
    cursorBlinking: 'smooth',
    bracketPairColorization: { enabled: true },
  });

  // Override bg
  monaco.editor.defineTheme('carla-dark', {
    base: 'vs-dark',
    inherit: true,
    rules: [],
    colors: { 'editor.background': '#16191f', 'editor.lineHighlightBackground': '#1d2330' }
  });
  monaco.editor.setTheme('carla-dark');

  // Cursor pos in statusbar
  editor.onDidChangeCursorPosition(e => {
    document.getElementById('st-pos').textContent = `Ln ${e.position.lineNumber}, Col ${e.position.column}`;
  });

  // Dirty state
  editor.onDidChangeModelContent(() => {
    if (!isDirty) {
      isDirty = true;
      document.getElementById('tab-label').classList.add('is-dirty');
    }
    schedulePreview();
  });

  // Load file content
  await loadFile();

  // Keyboard save
  editor.addCommand(monaco.KeyMod.CtrlCmd | monaco.KeyCode.KeyS, saveFile);
});

async function loadFile() {
  if (!FILE_PATH) return;
  try {
    const r = await fetch(`/api/files/read?path=${encodeURIComponent(FILE_PATH)}`);
    const data = await r.json();
    if (data.ok && data.content !== undefined) {
      editor.setValue(data.content);
      isDirty = false;
      document.getElementById('tab-label').classList.remove('is-dirty');
      updatePreview();
    } else {
      editor.setValue(`// Fehler: ${data.error || 'Datei konnte nicht geladen werden'}`);
    }
  } catch(e) {
    editor.setValue(`// Netzwerkfehler: ${e.message}`);
  }
}

// ── Save ──
async function saveFile() {
  const btn = document.getElementById('save-btn');
  btn.disabled = true;
  try {
    const r = await fetch('/api/files/write', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ path: FILE_PATH, content: editor.getValue() })
    });
    const data = await r.json();
    if (data.ok) {
      isDirty = false;
      document.getElementById('tab-label').classList.remove('is-dirty');
      const ind = document.getElementById('save-indicator');
      ind.classList.add('visible');
      setTimeout(() => ind.classList.remove('visible'), 2000);
      updatePreview();
    } else {
      alert(`Fehler beim Speichern: ${data.error}`);
    }
  } catch(e) {
    alert(`Netzwerkfehler: ${e.message}`);
  } finally {
    btn.disabled = false;
  }
}
document.getElementById('save-btn').addEventListener('click', saveFile);

// ── Preview ──
const PREVIEW_EXTS = ['html','htm','svg','md'];
let previewTimer;

function schedulePreview() {
  clearTimeout(previewTimer);
  previewTimer = setTimeout(updatePreview, 800);
}

function updatePreview() {
  const wrap = document.getElementById('preview-wrap');
  const placeholder = document.getElementById('preview-placeholder');
  const frame = document.getElementById('preview');
  if (!PREVIEW_EXTS.includes(currentExt)) {
    placeholder.classList.add('visible');
    frame.srcdoc = '';
    return;
  }
  placeholder.classList.remove('visible');
  let content = editor.getValue();
  if (currentExt === 'md') {
    content = `<pre style="font-family:system-ui;padding:2rem;max-width:800px;margin:auto;white-space:pre-wrap">${content.replace(/</g,'&lt;')}</pre>`;
  }
  frame.srcdoc = content;
}

document.getElementById('btn-refresh').addEventListener('click', updatePreview);

document.getElementById('btn-open').addEventListener('click', () => {
  const blob = new Blob([editor.getValue()], {type:'text/html'});
  window.open(URL.createObjectURL(blob), '_blank');
});

// Device switcher
document.querySelectorAll('.dev-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.dev-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const wrap = document.getElementById('preview-wrap');
    wrap.className = 'preview-frame-wrap ' + (btn.dataset.device === 'desktop' ? '' : btn.dataset.device);
  });
});

// ── Resize handle ──
const rh = document.getElementById('rh');
const mainEl = document.getElementById('main');
let resizing = false, startX, startA, startB;

rh.addEventListener('mousedown', e => {
  resizing = true;
  startX = e.clientX;
  const cols = getComputedStyle(mainEl).gridTemplateColumns.split(' ');
  startA = parseFloat(cols[0]);
  startB = parseFloat(cols[2]);
  rh.classList.add('dragging');
  document.body.classList.add('resizing');
  e.preventDefault();
});

document.addEventListener('mousemove', e => {
  if (!resizing) return;
  const dx = e.clientX - startX;
  const total = startA + startB;
  const newA = Math.max(200, Math.min(total - 200, startA + dx));
  mainEl.style.gridTemplateColumns = `${newA}px 6px 1fr`;
});

document.addEventListener('mouseup', () => {
  if (!resizing) return;
  resizing = false;
  rh.classList.remove('dragging');
  document.body.classList.remove('resizing');
});

// Warn on unload if dirty
window.addEventListener('beforeunload', e => {
  if (isDirty) { e.preventDefault(); e.returnValue = ''; }
});
