<!doctype html>
<html lang="de">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>CARLA — Editor</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" data-name="vs/editor/editor.main"
        href="https://cdn.jsdelivr.net/npm/monaco-editor@0.46.0/min/vs/editor/editor.main.css">
    <style>
        :root {
            --bg-0: #1e1e1e;
            --bg-1: #252526;
            --bg-2: #2d2d30;
            --bg-3: #3c3c3c;
            --line: #3c3c3c;
            --line-2: #454545;
            --text: #d4d4d4;
            --text-dim: #969696;
            --text-mute: #858585;
            --accent: #007acc;
            --accent-2: #1177bb;
            --green: #4ec9b0;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body {
            height: 100%; overflow: hidden;
            background: var(--bg-0); color: var(--text);
            font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
            font-size: 13px; -webkit-font-smoothing: antialiased;
        }
        button, input, a { font-family: inherit; color: inherit; }

        /* ── App Shell ── */
        .app {
            display: grid;
            grid-template-columns: 48px 1fr;
            grid-template-rows: 1fr 22px;
            height: 100vh;
        }

        /* ── Activity Bar ── */
        .activity-bar {
            grid-column: 1; grid-row: 1 / 3;
            background: #333333; border-right: 1px solid var(--line);
            display: flex; flex-direction: column; z-index: 30;
        }
        .act-top { flex: 1; display: flex; flex-direction: column; align-items: center; }
        .act-bottom { display: flex; flex-direction: column; align-items: center; padding-bottom: 6px; }
        .act-btn {
            width: 48px; height: 48px; border: none; background: transparent;
            color: #858585; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            position: relative; transition: color 0.12s; padding: 0; text-decoration: none;
        }
        .act-btn:hover { color: #cccccc; }
        .act-btn.active { color: #cccccc; }
        .act-btn.active::before {
            content: ''; position: absolute; left: 0; top: 0; bottom: 0;
            width: 2px; background: var(--accent);
        }
        .act-btn svg { width: 24px; height: 24px; stroke-width: 1.4; }

        /* ── Workspace (sidebar + editor + preview) ── */
        .workspace {
            grid-column: 2; grid-row: 1;
            display: grid;
            grid-template-columns: 240px 1px 1fr 5px 1fr;
            min-height: 0; overflow: hidden;
        }
        .workspace.preview-hidden {
            grid-template-columns: 240px 1px 1fr !important;
        }
        .workspace.preview-hidden .resize-handle,
        .workspace.preview-hidden .preview-pane { display: none; }

        /* ── Sidebar ── */
        .sidebar {
            background: #252526; display: flex; flex-direction: column;
            border-right: none; overflow: hidden; min-width: 0;
        }
        .sidebar-sep { background: var(--line); }
        .sidebar-header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 10px 12px 4px 18px; flex-shrink: 0; user-select: none;
        }
        .sidebar-title {
            font-size: 11px; font-weight: 700; letter-spacing: 0.08em;
            text-transform: uppercase; color: #bbb;
        }
        .sidebar-tree {
            flex: 1; overflow-y: auto; overflow-x: hidden;
            padding-bottom: 24px;
        }
        .tree-loading {
            display: flex; align-items: center; gap: 8px;
            padding: 8px 16px; color: var(--text-mute); font-size: 12px;
        }
        .spin {
            width: 10px; height: 10px; border-radius: 50%;
            border: 2px solid rgba(255,255,255,.15); border-top-color: #aaa;
            animation: spin .6s linear infinite; flex-shrink: 0;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Tree items */
        .tree-item {
            display: flex; align-items: center; gap: 3px;
            height: 22px; padding-right: 8px;
            cursor: pointer; font-size: 13px;
            color: #cccccc; white-space: nowrap;
            overflow: hidden; user-select: none;
        }
        .tree-item:hover { background: #2a2d2e; }
        .tree-item.is-active { background: #094771 !important; color: #fff; }
        .tree-arrow {
            width: 16px; height: 16px; min-width: 16px;
            display: flex; align-items: center; justify-content: center;
            color: #ccc; opacity: .75;
            transition: transform 0.12s ease; flex-shrink: 0;
        }
        .tree-arrow.open { transform: rotate(90deg); }
        .tree-arrow svg { width: 10px; height: 10px; }
        .tree-icon { width: 16px; height: 16px; min-width: 16px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .tree-icon svg { width: 14px; height: 14px; }
        .tree-name { flex: 1; overflow: hidden; text-overflow: ellipsis; font-size: 13px; }
        .tree-children { display: none; }
        .tree-children.open { display: block; }

        /* ── Editor Pane ── */
        .editor-pane { display: flex; flex-direction: column; min-width: 0; background: var(--bg-0); overflow: hidden; }
        .tabs-wrap {
            display: flex; align-items: stretch; background: var(--bg-1);
            border-bottom: 1px solid var(--line); height: 38px; flex-shrink: 0; overflow: hidden;
        }
        .tab-back {
            display: flex; align-items: center; padding: 0 8px;
            border-right: 1px solid var(--line); flex-shrink: 0;
        }
        .back-btn {
            width: 26px; height: 26px;
            border: 1px solid var(--line-2); background: var(--bg-2);
            border-radius: 3px; color: var(--text-dim);
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            text-decoration: none; transition: all 0.12s;
        }
        .back-btn:hover { background: var(--bg-3); color: var(--text); border-color: var(--accent); }
        .back-btn svg { width: 14px; height: 14px; }
        .tab {
            display: flex; align-items: center; gap: 8px;
            padding: 0 14px 0 12px; height: 38px;
            border-right: 1px solid var(--line);
            color: var(--text); font-size: 12.5px;
            font-family: "JetBrains Mono", monospace;
            position: relative; white-space: nowrap; background: var(--bg-0);
        }
        .tab::after {
            content: ''; position: absolute; left: 0; right: 0; top: 0;
            height: 2px; background: var(--accent);
        }
        .tab .dirty {
            width: 7px; height: 7px; border-radius: 50%;
            background: var(--accent); flex-shrink: 0; display: none;
        }
        .tab.is-dirty .dirty { display: block; }
        .tab-actions {
            margin-left: auto; display: flex; align-items: center;
            gap: 8px; padding: 0 10px; flex-shrink: 0;
        }
        .save-indicator {
            display: inline-flex; align-items: center; gap: 5px;
            font-size: 11.5px; color: var(--green); opacity: 0;
            transition: opacity 0.2s; font-family: "JetBrains Mono", monospace;
        }
        .save-indicator.visible { opacity: 1; }
        .save-indicator svg { width: 12px; height: 12px; }
        .save-btn {
            display: inline-flex; align-items: center; gap: 6px;
            height: 26px; padding: 0 14px;
            background: var(--accent); color: #fff;
            border: none; border-radius: 3px;
            font-size: 12px; font-weight: 500;
            cursor: pointer; transition: background 0.12s; flex-shrink: 0;
        }
        .save-btn:hover { background: var(--accent-2); }
        .save-btn:disabled { opacity: 0.6; pointer-events: none; }
        .save-btn svg { width: 13px; height: 13px; }
        #editor-host { flex: 1; min-height: 0; position: relative; }
        .monaco-editor, .monaco-editor-background, .monaco-editor .margin {
            background-color: #1e1e1e !important;
        }

        /* ── Resize Handle (editor/preview) ── */
        .resize-handle {
            background: transparent; position: relative;
            cursor: col-resize; z-index: 10; user-select: none;
        }
        .resize-handle::before {
            content: ''; position: absolute; top: 0; bottom: 0; left: 50%;
            width: 1px; background: var(--line);
            transform: translateX(-0.5px);
            transition: background 0.15s, width 0.15s;
        }
        .resize-handle:hover::before, .resize-handle.dragging::before { background: var(--accent); width: 2px; }
        body.resizing { cursor: col-resize; user-select: none; }
        body.resizing iframe { pointer-events: none; }

        /* ── Preview Pane ── */
        .preview-pane {
            display: flex; flex-direction: column;
            min-width: 0; background: var(--bg-1); overflow: hidden;
        }
        .preview-bar {
            display: flex; align-items: center; gap: 6px;
            padding: 0 8px; height: 38px;
            background: var(--bg-1); border-bottom: 1px solid var(--line);
            flex-shrink: 0;
        }
        .preview-label {
            font-size: 11px; font-weight: 700; letter-spacing: 0.08em;
            text-transform: uppercase; color: #bbb; padding: 0 4px;
        }
        .urlbar {
            flex: 1; height: 24px; background: var(--bg-3);
            border: 1px solid var(--line); border-radius: 3px;
            padding: 0 10px; display: flex; align-items: center; gap: 8px;
            color: var(--text-dim); font-size: 11.5px;
            font-family: "JetBrains Mono", monospace;
            overflow: hidden; min-width: 0;
        }
        .urlbar .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); flex-shrink: 0; }
        .urlbar .val { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; }
        .icon-btn {
            width: 28px; height: 26px;
            border: 1px solid var(--line-2); background: var(--bg-2);
            color: var(--text-dim); border-radius: 3px;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            transition: all 0.12s; flex-shrink: 0;
        }
        .icon-btn:hover { background: var(--bg-3); color: var(--accent); }
        .icon-btn svg { width: 13px; height: 13px; }
        .device-switch {
            display: inline-flex; background: var(--bg-2);
            border: 1px solid var(--line-2); border-radius: 3px;
            padding: 2px; gap: 2px; flex-shrink: 0;
        }
        .dev-btn {
            width: 26px; height: 20px; border: none; background: transparent;
            color: var(--text-mute); border-radius: 3px;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            transition: all 0.12s;
        }
        .dev-btn svg { width: 13px; height: 13px; }
        .dev-btn:hover { color: var(--text); }
        .dev-btn.active { background: var(--accent); color: #fff; }
        .preview-frame-wrap {
            flex: 1; min-height: 0; background: #2d2d30;
            display: flex; align-items: center; justify-content: center;
            padding: 0; transition: padding 0.25s; position: relative;
        }
        .preview-frame-wrap.tablet { padding: 18px; }
        .preview-frame-wrap.mobile { padding: 18px; }
        .device-frame {
            background: white; width: 100%; height: 100%;
            overflow: hidden; border: none;
            transition: max-width .25s, max-height .25s, border-radius .25s, box-shadow .25s;
        }
        .preview-frame-wrap.tablet .device-frame {
            max-width: 820px; aspect-ratio: 4/3; max-height: 100%;
            border-radius: 14px;
            box-shadow: 0 20px 50px -20px rgba(0,0,0,.8), 0 0 0 1px #2a3142;
        }
        .preview-frame-wrap.mobile .device-frame {
            max-width: 380px; aspect-ratio: 9/19; max-height: 100%;
            border-radius: 26px;
            box-shadow: 0 20px 50px -20px rgba(0,0,0,.8), 0 0 0 1px #2a3142;
        }
        #preview { width: 100%; height: 100%; border: none; display: block; background: white; }
        .preview-placeholder {
            position: absolute; inset: 0; display: none;
            align-items: center; justify-content: center;
            flex-direction: column; gap: 12px;
            color: var(--text-mute); font-size: 13px; pointer-events: none;
        }
        .preview-placeholder svg { width: 40px; height: 40px; opacity: .3; }
        .preview-placeholder.visible { display: flex; }

        /* ── Status Bar ── */
        .statusbar {
            grid-column: 2; grid-row: 2;
            background: var(--accent); display: flex; align-items: center;
            color: rgba(255,255,255,0.9);
            font-size: 11px; font-family: "JetBrains Mono", monospace;
        }
        .st-spacer { flex: 1; }
        .st-item {
            display: inline-flex; align-items: center; gap: 4px;
            padding: 0 8px; height: 22px; cursor: default; white-space: nowrap;
        }
        .st-item:hover { background: rgba(255,255,255,.12); }

        /* ── Tooltips ── */
        [data-tip] { position: relative; }
        [data-tip]::after {
            content: attr(data-tip);
            position: absolute; top: calc(100% + 7px); left: 50%;
            transform: translateX(-50%) translateY(-4px);
            background: #252526; color: #d4d4d4;
            font-size: 11.5px; font-weight: 500;
            font-family: "Segoe UI", system-ui, sans-serif;
            padding: 4px 9px; border-radius: 3px;
            border: 1px solid #454545; white-space: nowrap;
            pointer-events: none; opacity: 0;
            transition: opacity .12s ease 0s, transform .15s ease 0s;
            box-shadow: 0 4px 12px -4px rgba(0,0,0,.7); z-index: 9999;
        }
        [data-tip]:hover::after { opacity: 1; transform: translateX(-50%) translateY(0); transition-delay: .4s; }

        * { scrollbar-width: thin; scrollbar-color: #3c3c3c transparent; }
        ::-webkit-scrollbar { width: 8px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #3c3c3c; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--accent); }
    </style>
</head>

<div class="app">

    <!-- Activity Bar -->
    <div class="activity-bar">
        <div class="act-top">
            <button class="act-btn active" id="act-explorer" data-tip="Datei-Explorer">

        </section>

        <div class="resize-handle" id="rh"></div>

        <!-- Preview Pane -->
        <section class="preview-pane">

                    </svg>
                </button>
                <span class="preview-label">VORSCHAU</span>
                <div class="urlbar">
                    <div class="dot"></div>
                    <span class="val" id="url-val">—</span>
                </div>
                <button class="icon-btn" id="btn-refresh" data-tip="Neu laden">

                <div class="device-switch">

                        </svg>
                    </button>
                </div>
                <button class="icon-btn" id="btn-open" data-tip="In neuem Tab öffnen">

            <div class="preview-frame-wrap" id="preview-wrap">

                    <iframe id="preview" sandbox="allow-scripts allow-forms allow-modals allow-same-origin" title="Vorschau"></iframe>
                </div>
                <div class="preview-placeholder" id="preview-placeholder">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2">
                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8Z"/>

                    <span>Keine Vorschau für diesen Dateityp</span>

    </div>

    <!-- Status Bar -->
    <footer class="statusbar">
        <span class="st-item">
            <svg width="11" height="11" viewBox="0 0 16 16" fill="currentColor" style="opacity:.8">

            </svg>
            CARLA
        </span>
        <span class="st-item" id="st-file" style="max-width:450px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">—</span>

        <span class="st-item" id="st-pos">Ln 1, Col 1</span>
        <span class="st-item" id="st-lang">Text</span>
        <span class="st-item">UTF-8</span>
    </footer>
</div>

<script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.46.0/min/vs/loader.js"></script>
<script>
// ── URL params ──
const params    = new URLSearchParams(window.location.search);
const INIT_PATH = params.get('path') || '';
const BACK_URL  = params.get('back')  || '/filemanager/';

// Workspace root = directory of the opened file
const WORKSPACE_ROOT = (() => {
    const i = INIT_PATH.lastIndexOf('/');
    return i >= 0 ? INIT_PATH.slice(0, i + 1) : '/';
})();

document.getElementById('back-btn').href     = BACK_URL;
document.getElementById('back-act-btn').href = BACK_URL;

// ── Constants ──
const LANG_MAP = {
    html:'html', htm:'html', css:'css',
    js:'javascript', ts:'typescript',
    jsx:'javascript', tsx:'typescript',
    json:'json', md:'markdown',
    py:'python', sh:'shell',
    yml:'yaml', yaml:'yaml',
    xml:'xml', svg:'xml',
    php:'php', nginx:'nginx', conf:'nginx',
    ini:'ini', toml:'yaml',
};
const LANG_LABEL = {
    html:'HTML', htm:'HTML', css:'CSS',
    js:'JavaScript', ts:'TypeScript',
    jsx:'JSX', tsx:'TSX',
    json:'JSON', md:'Markdown',
    py:'Python', sh:'Shell',
    yml:'YAML', yaml:'YAML',
    xml:'XML', svg:'SVG',
    php:'PHP', nginx:'Nginx',
    conf:'Config', ini:'INI', toml:'TOML',
};
const PREVIEW_EXTS = ['html', 'htm', 'svg', 'md'];

// ── File Icons ──
const EXT_COLORS = {
    html:'#e34c26', htm:'#e34c26',
    css:'#264de4', scss:'#cc6699', sass:'#cc6699',
    js:'#f0db4f', ts:'#3178c6',
    jsx:'#61dafb', tsx:'#3178c6',
    json:'#cbcb41', md:'#519aba',
    py:'#3572a5', sh:'#4eaa25',
    php:'#8892be', xml:'#c0c0c0', svg:'#ffb13b',
    yml:'#cb171e', yaml:'#cb171e',
    conf:'#6d8086', nginx:'#269539',
    txt:'#a0a0a0',
};

function fileColor(name) {
    const e = name.includes('.') ? name.split('.').pop().toLowerCase() : '';
    return EXT_COLORS[e] || '#aaaaaa';
}

function fileIcon(name) {
    const c = fileColor(name);
    return `<svg viewBox="0 0 16 16" fill="none">
        <path d="M9.5 2H4a1 1 0 0 0-1 1v10a1 1 0 0 0 1 1h8a1 1 0 0 0 1-1V5.5L9.5 2z" fill="${c}" opacity=".85"/>
        <path d="M9.5 2v3.5H13" stroke="${c}" stroke-width=".5"/>
    </svg>`;
}

function dirIcon(open) {
    const c = '#dcb67a';
    return open
        ? `<svg viewBox="0 0 16 16" fill="${c}"><path d="M1 3.5A1.5 1.5 0 0 1 2.5 2h3.764c.414 0 .81.175 1.094.483L8.72 4H13.5A1.5 1.5 0 0 1 15 5.5v7a1.5 1.5 0 0 1-1.5 1.5h-11A1.5 1.5 0 0 1 1 12.5v-9z" opacity=".9"/></svg>`
        : `<svg viewBox="0 0 16 16" fill="${c}"><path d="M2.5 2A1.5 1.5 0 0 0 1 3.5v9A1.5 1.5 0 0 0 2.5 14h11a1.5 1.5 0 0 0 1.5-1.5v-7A1.5 1.5 0 0 0 13.5 4H8.72L7.358 2.483A1.5 1.5 0 0 0 6.264 2H2.5z" opacity=".9"/></svg>`;
}

// ── Active file state ──
let activeFile = INIT_PATH;
let activeTreeEl = null;
let editor, isDirty = false, currentExt = '';

function getExt(path) {
    const n = (path || '').split('/').pop();
    return n.includes('.') ? n.split('.').pop().toLowerCase() : '';
}

// ── File Tree ──
async function loadTreeDir(dirPath, depth, containerEl, autoTarget) {
    try {
        const r    = await fetch(`/api/files/browse?path=${encodeURIComponent(dirPath)}`);
        const data = await r.json();
        if (!data.ok) { containerEl.innerHTML = ''; return; }

        const dirs  = data.items.filter(i => i.type === 'dir').sort((a,b) => a.name.localeCompare(b.name));
        const files = data.items.filter(i => i.type !== 'dir').sort((a,b) => a.name.localeCompare(b.name));

        [...dirs, ...files].forEach(item => {
            const isDir = item.type === 'dir';
            const wrap  = document.createElement('div');

            const indent = `${depth * 12 + 8}px`;

            if (isDir) {
                const row = document.createElement('div');
                row.className = 'tree-item';
                row.style.paddingLeft = indent;

                const arrow = document.createElement('span');
                arrow.className = 'tree-arrow';
                arrow.innerHTML = '<svg viewBox="0 0 16 16" fill="currentColor"><path d="M6 4l5 4-5 4V4z"/></svg>';

                const icon = document.createElement('span');
                icon.className = 'tree-icon';
                icon.innerHTML = dirIcon(false);

                const nameEl = document.createElement('span');
                nameEl.className = 'tree-name';
                nameEl.textContent = item.name;

                row.appendChild(arrow);
                row.appendChild(icon);
                row.appendChild(nameEl);

                const children = document.createElement('div');
                children.className = 'tree-children';

                let loaded = false;
                const toggle = async (forceOpen) => {
                    const opening = forceOpen !== undefined ? forceOpen : !arrow.classList.contains('open');
                    arrow.classList.toggle('open', opening);
                    icon.innerHTML = dirIcon(opening);
                    children.classList.toggle('open', opening);
                    if (opening && !loaded) {
                        loaded = true;
                        const sub = autoTarget && autoTarget.startsWith(item.path + '/') ? autoTarget : null;
                        await loadTreeDir(item.path, depth + 1, children, sub);
                    }
                };
                row.addEventListener('click', () => toggle());

                // Auto-expand if active file is inside this dir
                if (autoTarget && autoTarget.startsWith(item.path + '/')) {
                    toggle(true);
                }

                wrap.appendChild(row);
                wrap.appendChild(children);

            } else {
                const row = document.createElement('div');
                row.className = 'tree-item';
                row.style.paddingLeft = `calc(${indent} + 16px)`;

                const icon = document.createElement('span');
                icon.className = 'tree-icon';
                icon.innerHTML = fileIcon(item.name);

                const nameEl = document.createElement('span');
                nameEl.className = 'tree-name';
                nameEl.textContent = item.name;

                row.appendChild(icon);
                row.appendChild(nameEl);

                if (item.path === activeFile) {
                    row.classList.add('is-active');
                    activeTreeEl = row;
                }

                row.addEventListener('click', () => openFile(item.path, row));
                wrap.appendChild(row);
            }

            containerEl.appendChild(wrap);
        });
    } catch(e) {
        console.error('Tree error:', e);
    }
}

async function initTree() {
    const treeEl = document.getElementById('sidebar-tree');
    treeEl.innerHTML = '';
    const rootName = WORKSPACE_ROOT.replace(/\/$/, '').split('/').pop() || '/';
    document.getElementById('sidebar-root-label').textContent = rootName.toUpperCase();
    await loadTreeDir(WORKSPACE_ROOT, 0, treeEl, activeFile);
}

// ── Open file from tree ──
function openFile(filePath, treeEl) {
    if (isDirty && !confirm('Datei hat ungespeicherte Änderungen. Trotzdem öffnen?')) return;
    if (activeTreeEl) activeTreeEl.classList.remove('is-active');
    activeTreeEl = treeEl;
    if (treeEl) treeEl.classList.add('is-active');
    activeFile = filePath;
    isDirty = false;
    document.getElementById('tab-label').classList.remove('is-dirty');
    updatePathDisplay();
    if (editor) loadFileContent();
}

// ── Path display ──
function updatePathDisplay() {
    const parts    = activeFile.split('/').filter(Boolean);
    const filename = parts.pop() || activeFile;
    currentExt = getExt(activeFile);

    document.getElementById('tab-filename').textContent = filename;
    document.getElementById('st-file').textContent      = activeFile;
    document.getElementById('url-val').textContent      = filename;
    document.title = `${filename} — CARLA Editor`;
    document.getElementById('st-lang').textContent = LANG_LABEL[currentExt] || (currentExt ? currentExt.toUpperCase() : 'Text');
}

// ── Monaco init ──
require(['vs/editor/editor.main'], async () => {
    updatePathDisplay();

    monaco.editor.defineTheme('vscode-dark-plus', {
        base: 'vs-dark', inherit: true, rules: [],
        colors: {
            'editor.background':                 '#1e1e1e',
            'editor.lineHighlightBackground':    '#2d2d30',
            'editorLineNumber.foreground':       '#858585',
            'editorLineNumber.activeForeground': '#c6c6c6',
            'editor.selectionBackground':        '#264f78',
        }
    });

    editor = monaco.editor.create(document.getElementById('editor-host'), {
        value: '', language: LANG_MAP[currentExt] || 'plaintext',
        theme: 'vscode-dark-plus',
        fontSize: 14,
        fontFamily: '"JetBrains Mono", "Consolas", monospace',
        fontLigatures: true,
        minimap: { enabled: true },
        scrollBeyondLastLine: false,
        wordWrap: 'off', tabSize: 2, insertSpaces: true,
        automaticLayout: true, lineNumbers: 'on',
        renderLineHighlight: 'all', smoothScrolling: true,
        cursorBlinking: 'blink',
        bracketPairColorization: { enabled: true },
        padding: { top: 8 },
    });

    editor.onDidChangeCursorPosition(e => {
        document.getElementById('st-pos').textContent =
            `Ln ${e.position.lineNumber}, Col ${e.position.column}`;
    });
    editor.onDidChangeModelContent(() => {
        if (!isDirty) {
            isDirty = true;
            document.getElementById('tab-label').classList.add('is-dirty');
        }
        schedulePreview();
    });
    editor.addCommand(monaco.KeyMod.CtrlCmd | monaco.KeyCode.KeyS, saveFile);

    await loadFileContent();
    initTree();
});

async function loadFileContent() {
    if (!activeFile || !editor) return;
    try {
        const r    = await fetch(`/api/files/read?path=${encodeURIComponent(activeFile)}`);
        const data = await r.json();
        if (data.ok && data.content !== undefined) {
            const lang = LANG_MAP[currentExt] || 'plaintext';
            monaco.editor.setModelLanguage(editor.getModel(), lang);
            editor.setValue(data.content);
            isDirty = false;
            document.getElementById('tab-label').classList.remove('is-dirty');
            updatePreview();
        } else {
            editor.setValue(`// Fehler: ${data.error || 'Datei nicht ladbar'}`);
        }
    } catch(e) {
        editor.setValue(`// Netzwerkfehler: ${e.message}`);
    }
}

// ── Save ──
async function saveFile() {
    const btn = document.getElementById('save-btn');
    btn.disabled = true;
    try {
        const r    = await fetch('/api/files/write', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ path: activeFile, content: editor.getValue() })
        });
        const data = await r.json();
        if (data.ok) {
            isDirty = false;
            document.getElementById('tab-label').classList.remove('is-dirty');
            const ind = document.getElementById('save-indicator');
            ind.classList.add('visible');
            setTimeout(() => ind.classList.remove('visible'), 2000);
            updatePreview();
        } else {
            alert(`Speicherfehler: ${data.error}`);
        }
    } catch(e) {
        alert(`Netzwerkfehler: ${e.message}`);
    } finally {
        btn.disabled = false;
    }
}
document.getElementById('save-btn').addEventListener('click', saveFile);

// ── Preview ──
let previewTimer;
function schedulePreview() {
    clearTimeout(previewTimer);
    previewTimer = setTimeout(updatePreview, 800);
}
function updatePreview() {
    const placeholder = document.getElementById('preview-placeholder');
    const frame       = document.getElementById('preview');
    if (!PREVIEW_EXTS.includes(currentExt)) {
        placeholder.classList.add('visible');
        frame.srcdoc = '';
        return;
    }
    placeholder.classList.remove('visible');
    let content = editor ? editor.getValue() : '';
    if (currentExt === 'md') {
        content = `<pre style="font-family:system-ui;padding:2rem;max-width:800px;margin:auto;white-space:pre-wrap;line-height:1.65">${
            content.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
        }</pre>`;
    }
    frame.srcdoc = content;
}

document.getElementById('btn-refresh').addEventListener('click', updatePreview);
document.getElementById('btn-open').addEventListener('click', () => {
    const blob = new Blob([editor.getValue()], { type: 'text/html' });
    window.open(URL.createObjectURL(blob), '_blank');
});

// ── Preview Toggle ──
let previewVisible = true;
const wsEl        = document.getElementById('workspace');
const toggleIcon  = document.getElementById('toggle-icon');
const toggleBtn   = document.getElementById('btn-toggle-preview');

function setPreviewVisible(v) {
    previewVisible = v;
    if (v) {
        wsEl.classList.remove('preview-hidden');
        wsEl.style.gridTemplateColumns = ''; // reset to CSS default
        toggleBtn.setAttribute('data-tip', 'Vorschau einklappen');
        toggleIcon.innerHTML = '<path d="M10 4l4 4-4 4M2 4l4 4-4 4"/>';
    } else {
        wsEl.classList.add('preview-hidden');
        toggleBtn.setAttribute('data-tip', 'Vorschau ausklappen');
        toggleIcon.innerHTML = '<path d="M6 4L2 8l4 4M14 4l-4 4 4 4"/>';
    }
    if (editor) editor.layout();
}
toggleBtn.addEventListener('click', () => setPreviewVisible(!previewVisible));

// Device switcher
document.querySelectorAll('.dev-btn').forEach(btn => {
    btn.addEventListener('click', () => {
        document.querySelectorAll('.dev-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        const wrap = document.getElementById('preview-wrap');
        wrap.className = 'preview-frame-wrap ' + (btn.dataset.device === 'desktop' ? '' : btn.dataset.device);
    });
});

// ── Resize handle (editor ↔ preview) ──
const rh = document.getElementById('rh');
let resizing = false, startX, startA, startB;

rh.addEventListener('mousedown', e => {
    resizing = true; startX = e.clientX;
    const cols = getComputedStyle(wsEl).gridTemplateColumns.split(' ');
    // 0=240px 1=1px 2=editor 3=5px 4=preview
    startA = parseFloat(cols[2]);
    startB = parseFloat(cols[4]);
    rh.classList.add('dragging');
    document.body.classList.add('resizing');
    e.preventDefault();
});
document.addEventListener('mousemove', e => {
    if (!resizing) return;
    const dx = e.clientX - startX;
    const total = startA + startB;
    const newA = Math.max(180, Math.min(total - 150, startA + dx));
    wsEl.style.gridTemplateColumns = `240px 1px ${newA}px 5px 1fr`;
});
document.addEventListener('mouseup', () => {
    if (!resizing) return;
    resizing = false;
    rh.classList.remove('dragging');
    document.body.classList.remove('resizing');
});

window.addEventListener('beforeunload', e => {
    if (isDirty) { e.preventDefault(); e.returnValue = ''; }
});
</script>
